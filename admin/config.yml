backend:
  name: github
  repo: dbpittman/pittmans-site
  branch: main
  base_url: https://api.netlify.com

media_folder: "images"
public_folder: "/images"

site_url: https://pittmans.ca
logo_url: /images/img-03-fc36aa75c6.png

editor:
  preview: false

collections:
  - name: "record"
    label: "The Record (archive photos)"
    files:
      - name: "record"
        label: "Archive entries"
        file: "content/record.json"
        fields:
          - label: "Entries"
            name: "items"
            widget: "list"
            summary: "{{fields.year}} — {{fields.label}}"
            fields:
              - { label: "Photo", name: "image", widget: "image" }
              - { label: "Year (or era, e.g. 1990s)", name: "year", widget: "string" }
              - { label: "Name & place", name: "label", widget: "string" }
              - { label: "Image description (accessibility)", name: "alt", widget: "string", required: false }

  - name: "projects"
    label: "Projects"
    files:
      - name: "projects"
        label: "Project entries"
        file: "content/projects.json"
        fields:
          - label: "Projects"
            name: "items"
            widget: "list"
            summary: "{{fields.sheet}} — {{fields.title}}"
            fields:
              - { label: "Sheet number (e.g. A-04.2)", name: "sheet", widget: "string" }
              - { label: "Location line", name: "location", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "body", widget: "text" }
              - { label: "Tags", name: "tags", widget: "list", field: { label: "Tag", name: "tag", widget: "string" } }
              - { label: "Photo", name: "image", widget: "image" }
              - { label: "Image description", name: "alt", widget: "string", required: false }
              - { label: "Flagship (featured on home page)", name: "flagship", widget: "boolean", default: false }

  - name: "settings"
    label: "Contact details"
    files:
      - name: "settings"
        label: "Contact & company details"
        file: "content/settings.json"
        fields:
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Head office line", name: "head_office", widget: "string" }
          - { label: "Operating line", name: "operating", widget: "string" }

  - name: "copy"
    label: "Site copy"
    files:
      - name: "pages"
        label: "Headings, hero & footer"
        file: "content/pages.json"
        fields:
          - label: "Hero (home page)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Headline line 1", name: "line1", widget: "string" }
              - { label: "Headline line 2 (light)", name: "line2", widget: "string" }
              - { label: "Headline line 3 (blue, bold)", name: "line3", widget: "string" }
              - { label: "Sub tagline", name: "sub", widget: "string" }
              - { label: "Primary button", name: "btn_primary", widget: "string" }
              - { label: "Secondary button", name: "btn_secondary", widget: "string" }
              - label: "Titleblock cells"
                name: "titleblock"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Value", name: "value", widget: "string" }
          - label: "What We Build section"
            name: "sectors"
            widget: "object"
            fields:
              - { label: "Heading line 1", name: "heading_line1", widget: "string" }
              - { label: "Heading line 2", name: "heading_line2", widget: "string" }
              - { label: "Intro paragraph", name: "lede", widget: "text" }
              - { label: "Also on the record line", name: "also_note", widget: "string" }
          - label: "Projects page"
            name: "projects_page"
            widget: "object"
            fields:
              - { label: "Heading line 1", name: "heading_line1", widget: "string" }
              - { label: "Heading line 2", name: "heading_line2", widget: "string" }
              - { label: "Intro paragraph", name: "lede", widget: "text" }
              - { label: "Record title", name: "record_title", widget: "string" }
              - { label: "Record range", name: "record_range", widget: "string" }
              - { label: "Record hint", name: "record_hint", widget: "string" }
              - { label: "Record first card year", name: "record_first_year", widget: "string" }
              - { label: "Record first card label", name: "record_first_label", widget: "string" }
              - { label: "See-all button", name: "see_all", widget: "string" }
          - label: "Contact heading"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Big line", name: "heading", widget: "string" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Left", name: "left", widget: "string" }
              - { label: "Middle", name: "mid", widget: "string" }
              - { label: "Right", name: "right", widget: "string" }

  - name: "divisions"
    label: "Divisions (six cards)"
    files:
      - name: "divisions"
        label: "Division content"
        file: "content/divisions.json"
        fields:
          - label: "Divisions"
            name: "items"
            widget: "list"
            summary: "{{fields.key}} — {{fields.title}}"
            fields:
              - { label: "Category label (e.g. Marine)", name: "key", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Short copy (home card)", name: "short_body", widget: "text" }
              - { label: "Expanded copy (What We Build page)", name: "long_body", widget: "text" }
              - { label: "Tags", name: "tags", widget: "list", field: { label: "Tag", name: "tag", widget: "string" } }
              - { label: "Card photo (home)", name: "thumb", widget: "image" }
              - { label: "Card photo description", name: "thumb_alt", widget: "string", required: false }
              - { label: "Large photo (What We Build page)", name: "image", widget: "image" }
              - { label: "Large photo description", name: "alt", widget: "string", required: false }
              - { label: "Card photo style (advanced, leave alone)", name: "thumb_style", widget: "string", required: false }
              - { label: "Large photo style (advanced, leave alone)", name: "img_style", widget: "string", required: false }

  - name: "tech"
    label: "Technology schedule"
    files:
      - name: "tech"
        label: "Technology"
        file: "content/tech.json"
        fields:
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Intro paragraph", name: "lede", widget: "text" }
          - label: "Rows"
            name: "rows"
            widget: "list"
            summary: "{{fields.no}} — {{fields.name}}"
            fields:
              - { label: "Number (e.g. T-07)", name: "no", widget: "string" }
              - { label: "Technology", name: "name", widget: "string" }
              - { label: "What it does for your project", name: "desc", widget: "text" }

  - name: "why"
    label: "Why Pittmans"
    files:
      - name: "why"
        label: "Why Pittmans"
        file: "content/why.json"
        fields:
          - { label: "Heading line 1", name: "heading_line1", widget: "string" }
          - { label: "Heading line 2", name: "heading_line2", widget: "string" }
          - label: "Cards"
            name: "cards"
            widget: "list"
            summary: "{{fields.num}} {{fields.title}}"
            fields:
              - { label: "Number (e.g. 01.)", name: "num", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
