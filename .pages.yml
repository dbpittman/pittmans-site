media:
  input: images
  output: /images

content:
  - name: record
    label: The Record (archive photos)
    type: file
    path: content/record.json
    fields:
      - name: items
        label: Archive entries
        type: object
        list: true
        fields:
          - { name: image, label: Photo, type: image }
          - { name: year, label: "Year (or era, e.g. 1990s)", type: string }
          - { name: label, label: "Name & place", type: string }
          - { name: alt, label: "Image description", type: string, required: false }

  - name: projects
    label: Projects
    type: file
    path: content/projects.json
    fields:
      - name: items
        label: Project entries
        type: object
        list: true
        fields:
          - { name: sheet, label: "Sheet number (e.g. A-04.2)", type: string }
          - { name: location, label: "Location line", type: string }
          - { name: title, label: Title, type: string }
          - { name: body, label: Description, type: text }
          - { name: tags, label: Tags, type: string, list: true }
          - { name: image, label: Photo, type: image }
          - { name: alt, label: "Image description", type: string, required: false }
          - { name: flagship, label: "Flagship (featured on home page)", type: boolean, default: false }

  - name: divisions
    label: Divisions (six cards)
    type: file
    path: content/divisions.json
    fields:
      - name: items
        label: Divisions
        type: object
        list: true
        fields:
          - { name: key, label: "Category label (e.g. Marine)", type: string }
          - { name: title, label: Title, type: string }
          - { name: short_body, label: "Short copy (home card)", type: text }
          - { name: long_body, label: "Expanded copy (What We Build page)", type: text }
          - { name: tags, label: Tags, type: string, list: true }
          - { name: thumb, label: "Card photo (home)", type: image }
          - { name: thumb_alt, label: "Card photo description", type: string, required: false }
          - { name: image, label: "Large photo (What We Build page)", type: image }
          - { name: alt, label: "Large photo description", type: string, required: false }
          - { name: thumb_style, label: "Card photo style (advanced, leave alone)", type: string, required: false }
          - { name: img_style, label: "Large photo style (advanced, leave alone)", type: string, required: false }

  - name: tech
    label: Technology schedule
    type: file
    path: content/tech.json
    fields:
      - { name: heading, label: Heading, type: string }
      - { name: lede, label: "Intro paragraph", type: text }
      - name: rows
        label: Rows
        type: object
        list: true
        fields:
          - { name: "no", label: "Number (e.g. T-07)", type: string }
          - { name: name, label: Technology, type: string }
          - { name: desc, label: "What it does for your project", type: text }

  - name: why
    label: Why Pittmans
    type: file
    path: content/why.json
    fields:
      - { name: heading_line1, label: "Heading line 1", type: string }
      - { name: heading_line2, label: "Heading line 2", type: string }
      - name: cards
        label: Cards
        type: object
        list: true
        fields:
          - { name: num, label: "Number (e.g. 01.)", type: string }
          - { name: title, label: Title, type: string }
          - { name: body, label: Body, type: text }

  - name: pages
    label: Headings, hero & footer
    type: file
    path: content/pages.json
    fields:
      - name: hero
        label: Hero (home page)
        type: object
        fields:
          - { name: line1, label: "Headline line 1", type: string }
          - { name: line2, label: "Headline line 2 (light)", type: string }
          - { name: line3, label: "Headline line 3 (blue, bold)", type: string }
          - { name: sub, label: "Sub tagline", type: string }
          - { name: btn_primary, label: "Primary button", type: string }
          - { name: btn_secondary, label: "Secondary button", type: string }
          - name: titleblock
            label: Titleblock cells
            type: object
            list: true
            fields:
              - { name: label, label: Label, type: string }
              - { name: value, label: Value, type: string }
      - name: sectors
        label: What We Build section
        type: object
        fields:
          - { name: heading_line1, label: "Heading line 1", type: string }
          - { name: heading_line2, label: "Heading line 2", type: string }
          - { name: lede, label: "Intro paragraph", type: text }
          - { name: also_note, label: "Also on the record line", type: string }
      - name: projects_page
        label: Projects page
        type: object
        fields:
          - { name: heading_line1, label: "Heading line 1", type: string }
          - { name: heading_line2, label: "Heading line 2", type: string }
          - { name: lede, label: "Intro paragraph", type: text }
          - { name: record_title, label: "Record title", type: string }
          - { name: record_range, label: "Record range", type: string }
          - { name: record_hint, label: "Record hint", type: string }
          - { name: record_first_year, label: "Record first card year", type: string }
          - { name: record_first_label, label: "Record first card label", type: string }
          - { name: see_all, label: "See-all button", type: string }
      - name: contact
        label: Contact heading
        type: object
        fields:
          - { name: heading, label: "Big line", type: string }
      - name: footer
        label: Footer
        type: object
        fields:
          - { name: left, label: Left, type: string }
          - { name: mid, label: Middle, type: string }
          - { name: right, label: Right, type: string }

  - name: settings
    label: Contact details
    type: file
    path: content/settings.json
    fields:
      - { name: phone, label: Phone, type: string }
      - { name: email, label: Email, type: string }
      - { name: head_office, label: "Head office line", type: string }
      - { name: operating, label: "Operating line", type: string }
